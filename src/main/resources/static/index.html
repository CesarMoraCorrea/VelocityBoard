<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VelocityBoard - Tablero Reactivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: rgba(30, 41, 59, 0.7);
            --column-bg: rgba(15, 23, 42, 0.6);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #8b5cf6;
            --danger: #ef4444;
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        /* AUTH SECTION */
        #authSection {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: inherit;
        }

        .auth-container {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-container h2 {
            margin-top: 0;
            font-weight: 800;
            font-size: 2rem;
            background: -webkit-linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            color: #94a3b8;
            transition: all 0.3s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        #authError { color: var(--danger); margin-top: 15px; font-size: 0.9rem; }

        /* BOARD SECTION */
        #boardSection {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            margin: 0;
            font-weight: 800;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1 i { color: var(--primary); }

        .btn-small {
            width: auto;
            padding: 8px 16px;
            font-size: 0.9rem;
            background: transparent;
            border: 1px solid var(--border);
        }
        
        .btn-small:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: none;
            box-shadow: none;
        }

        .board-container {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 20px 30px;
            overflow-x: auto;
            align-items: flex-start;
        }

        .column {
            min-width: 300px;
            width: 300px;
            background: var(--column-bg);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 120px);
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            min-height: 50px;
            padding-right: 5px;
        }

        /* Scrollbar customization */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        .task-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            cursor: grab;
            transition: transform 0.2s;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-card:hover { border-color: rgba(255, 255, 255, 0.3); }
        .task-card:active { cursor: grabbing; transform: scale(0.98); }

        .task-title { font-weight: 600; margin-bottom: 5px; color: #fff; }
        .task-desc { font-size: 0.85rem; color: #94a3b8; }
        .task-footer {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #64748b;
        }

        .add-task-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed var(--border);
            color: #94a3b8;
            border-radius: 10px;
            padding: 12px;
            text-align: left;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .add-task-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        .add-task-btn i { margin-right: 8px; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h3 { margin: 0; }
        .close-btn { background: none; border: none; color: #94a3b8; font-size: 1.5rem; padding: 0; cursor: pointer;}
        .close-btn:hover { color: white; }

        .pill {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
        }
        .pill.todo { color: var(--primary); background: rgba(59, 130, 246, 0.15); }
        .pill.in-progress { color: #f59e0b; background: rgba(245, 158, 11, 0.15); }
        .pill.done { color: var(--success); background: rgba(16, 185, 129, 0.15); }

        /* NAV */
        .btn-nav {
            width: auto; padding: 8px 16px; font-size: 0.85rem;
            background: transparent; border: 1px solid var(--border); color: #94a3b8;
        }
        .btn-nav:hover { background: rgba(255,255,255,0.08); transform: none; box-shadow: none; color: white; }
        .btn-nav.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* USERS SECTION */
        .users-container { display: none; flex-direction: column; flex: 1; padding: 30px; overflow-y: auto; }
        .users-container.visible { display: flex; }
        .users-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .users-header h2 { margin: 0; font-weight: 800; font-size: 1.5rem; }
        .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .user-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px;
            padding: 20px; display: flex; flex-direction: column; gap: 12px;
            animation: fadeIn 0.3s ease-out; transition: border-color 0.2s;
        }
        .user-card:hover { border-color: rgba(255,255,255,0.3); }
        .user-card-header { display: flex; align-items: center; gap: 14px; }
        .user-avatar {
            width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.2rem; color: white;
        }
        .user-card-name { font-weight: 700; font-size: 0.95rem; }
        .user-card-email { font-size: 0.8rem; color: #94a3b8; margin-top: 2px; }
        .role-badge {
            display: inline-block; padding: 4px 10px; border-radius: 20px;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .role-badge.admin { background: rgba(139,92,246,0.2); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .role-badge.user  { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
        .user-id { font-size: 0.72rem; color: #475569; font-family: monospace; }
        .users-loading { text-align: center; color: #64748b; padding: 50px; font-size: 1rem; }
        .reload-btn {
            width: auto; padding: 9px 18px; font-size: 0.85rem;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #94a3b8;
        }
        .reload-btn:hover { background: rgba(255,255,255,0.1); transform: none; box-shadow: none; color: white; }

        /* EDIT USER MODAL */
        .edit-btn {
            width: auto; padding: 7px 14px; font-size: 0.8rem; margin-top: 4px;
            background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3);
            color: #60a5fa; border-radius: 8px;
        }
        .edit-btn:hover { background: rgba(59,130,246,0.3); transform: none; box-shadow: none; color: white; }
        .modal-select {
            width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.2);
            border: 1px solid var(--border); border-radius: 10px; color: white;
            font-family: inherit; font-size: 0.95rem; outline: none;
            transition: border-color 0.3s; appearance: none;
        }
        .modal-select:focus { border-color: var(--primary); }
        .modal-select option { background: #1e293b; color: white; }
        .edit-hint { font-size: 0.78rem; color: #64748b; margin-top: -12px; margin-bottom: 8px; }
        .save-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
        }

    </style>
</head>
<body>

    <!-- AUTHENTICATION VIEW -->
    <div id="authSection">
        <div class="auth-container">
            <h2>VelocityBoard</h2>
            <div class="tabs">
                <div class="tab active" onclick="switchAuthTab('login')">Ingresar</div>
                <div class="tab" onclick="switchAuthTab('register')">Nuevo</div>
            </div>

            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Usuario" required autocomplete="off">
                </div>
                <div class="input-group" id="emailGroup" style="display: none;">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Correo electrónico">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" id="authSubmitBtn">Entrar al Tablero</button>
            </form>
            <div id="authError"></div>
        </div>
    </div>

    <!-- MAIN BOARD VIEW -->
    <div id="boardSection">
        <header>
            <h1><i class="fas fa-bolt"></i> VelocityBoard</h1>
            <nav style="display:flex; gap: 8px;">
                <button class="btn-nav active" id="navBoard" onclick="switchView('board')">
                    <i class="fas fa-columns"></i> Tablero
                </button>
                <button class="btn-nav" id="navUsers" onclick="switchView('users')" style="display:none">
                    <i class="fas fa-users"></i> Usuarios
                </button>
            </nav>
            <div>
                <span id="userGreeting" style="margin-right: 15px; color: #94a3b8;">Hola!</span>
                <button class="btn-small" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</button>
            </div>
        </header>

        <div class="board-container">
            <!-- TO DO COLUMN -->
            <div class="column" id="col-TODO">
                <div class="column-header">
                    <span>Por Hacer</span>
                    <span class="pill todo" id="cnt-TODO">0</span>
                </div>
                <div class="task-list" id="list-TODO"></div>
                <div class="add-task-btn" onclick="openModal('TODO')">
                    <i class="fas fa-plus"></i> Añadir Tarjeta
                </div>
            </div>

            <!-- IN PROGRESS COLUMN -->
            <div class="column" id="col-IN_PROGRESS">
                <div class="column-header">
                    <span>En Progreso</span>
                    <span class="pill in-progress" id="cnt-IN_PROGRESS">0</span>
                </div>
                <div class="task-list" id="list-IN_PROGRESS"></div>
                <div class="add-task-btn" onclick="openModal('IN_PROGRESS')">
                    <i class="fas fa-plus"></i> Añadir Tarjeta
                </div>
            </div>

            <!-- DONE COLUMN -->
            <div class="column" id="col-DONE">
                <div class="column-header">
                    <span>Completadas</span>
                    <span class="pill done" id="cnt-DONE">0</span>
                </div>
                <div class="task-list" id="list-DONE"></div>
                <div class="add-task-btn" onclick="openModal('DONE')">
                    <i class="fas fa-plus"></i> Añadir Tarjeta
                </div>
            </div>
        </div>

        <!-- USERS VIEW — Adaptador de entrada UI (Arquitectura Hexagonal) -->
        <div class="users-container" id="usersContainer">
            <div class="users-header">
                <h2><i class="fas fa-users" style="color: var(--accent); margin-right: 10px;"></i> Gestión de Usuarios</h2>
                <button class="reload-btn" onclick="loadUsers()"><i class="fas fa-sync-alt"></i> Recargar</button>
            </div>
            <div id="usersGrid" class="users-grid"></div>
        </div>
    </div>

    <!-- ADD TASK MODAL -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Nueva Tarjeta</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="taskForm" onsubmit="createTask(event)">
                <input type="hidden" id="taskStatus">
                <div class="input-group">
                    <input type="text" id="taskTitle" placeholder="Título de la tarea" required autocomplete="off">
                </div>
                <div class="input-group">
                    <input type="text" id="taskDesc" placeholder="Descripción breve" autocomplete="off">
                </div>
                <button type="submit">Agregar al Tablero</button>
            </form>
        </div>
    </div>

    <!-- EDIT USER MODAL — Adaptador de entrada UI (Arquitectura Hexagonal) -->
    <div class="modal-overlay" id="editUserModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-user-edit" style="color:var(--primary);margin-right:8px"></i> Editar Usuario</h3>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editUserForm" onsubmit="submitEditUser(event)">
                <input type="hidden" id="editUserId">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="editUsername" placeholder="Nuevo username" autocomplete="off">
                </div>
                <p class="edit-hint">Dejar vacío para no modificar</p>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="editEmail" placeholder="Nuevo email" autocomplete="off">
                </div>
                <p class="edit-hint">Dejar vacío para no modificar</p>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="editPassword" placeholder="Nueva contraseña" autocomplete="off">
                </div>
                <p class="edit-hint">Dejar vacío para no modificar</p>
                <div class="input-group">
                    <select id="editRole" class="modal-select">
                        <option value="">— Mantener rol actual —</option>
                        <option value="ROLE_USER">Usuario</option>
                        <option value="ROLE_ADMIN">Administrador</option>
                    </select>
                </div>
                <div id="editUserError" style="color:var(--danger);font-size:0.85rem;margin-bottom:10px;"></div>
                <button type="submit" class="save-btn" id="editSubmitBtn">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
            </form>
        </div>
    </div>

<script>
    let currentMode = 'login';
    let jwtToken = '';
    let abortController = null;
    let localTasks = []; // Cache to ensure no duplicates in UI

    // Automatically check for existing session
    window.onload = () => {
        const storedToken = localStorage.getItem('vb_token');
        if(storedToken) {
            jwtToken = storedToken;
            showBoard();
        }
    };

    function switchAuthTab(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('emailGroup').style.display = mode === 'register' ? 'block' : 'none';
        document.getElementById('email').required = mode === 'register';
        document.getElementById('authSubmitBtn').innerText = mode === 'login' ? 'Entrar al Tablero' : 'Crear mi Cuenta';
        document.getElementById('authError').innerText = '';
    }

    async function handleAuth(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const email = document.getElementById('email').value;

        const url = currentMode === 'login' ? '/auth/login' : '/auth/register';
        const body = currentMode === 'login' ? { username, password } : { username, email, password };

        document.getElementById('authSubmitBtn').innerText = 'Conectando...';

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                const data = await res.json();
                jwtToken = data.token;
                localStorage.setItem('vb_token', jwtToken);
                showBoard();
            } else {
                const err = await res.text();
                document.getElementById('authError').innerText = err || 'Credenciales inválidas';
            }
        } catch (error) {
            document.getElementById('authError').innerText = 'Error de conexión con el tablero.';
        }
        document.getElementById('authSubmitBtn').innerText = currentMode === 'login' ? 'Entrar al Tablero' : 'Crear mi Cuenta';
    }

    function showBoard() {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('boardSection').style.display = 'flex';

        // Extraer claims del JWT para personalizar UI según rol (Hexagonal: adaptador de entrada)
        const claims = parseJwt(jwtToken);
        document.getElementById('userGreeting').innerText = `Hola, ${claims.sub || 'Usuario'}!`;
        if (claims.role === 'ROLE_ADMIN') {
            document.getElementById('navUsers').style.display = 'inline-block';
        }

        // Setup Real-time reactivity via custom fetch stream
        listenToStream();
    }

    function logout() {
        localStorage.removeItem('vb_token');
        jwtToken = '';
        if(abortController) abortController.abort();
        document.getElementById('authSection').style.display = 'flex';
        document.getElementById('boardSection').style.display = 'none';
        // Reset nav y vistas
        document.getElementById('navUsers').style.display = 'none';
        document.getElementById('navBoard').classList.add('active');
        document.getElementById('navUsers').classList.remove('active');
        document.querySelector('.board-container').style.display = 'flex';
        document.getElementById('usersContainer').classList.remove('visible');
        // Clear tasks
        document.getElementById('list-TODO').innerHTML = '';
        document.getElementById('list-IN_PROGRESS').innerHTML = '';
        document.getElementById('list-DONE').innerHTML = '';
        localTasks = [];
    }

    // Modal logic
    function openModal(status) {
        document.getElementById('taskStatus').value = status;
        document.getElementById('taskModal').style.display = 'flex';
        document.getElementById('taskTitle').focus();
    }

    function closeModal() {
        document.getElementById('taskModal').style.display = 'none';
        document.getElementById('taskForm').reset();
    }

    // Create Task (API Call)
    async function createTask(e) {
        e.preventDefault();
        const title = document.getElementById('taskTitle').value;
        const desc = document.getElementById('taskDesc').value;
        const status = document.getElementById('taskStatus').value;

        try {
            await fetch('/tasks', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${jwtToken}`
                },
                body: JSON.stringify({ title, description: desc, status })
            });
            closeModal();
        } catch (err) {
            alert('Falló al crear la tarea');
        }
    }

    // Manual reactive stream consumer to bypass EventSource auth limitations
    async function listenToStream() {
        if(abortController) abortController.abort();
        abortController = new AbortController();

        try {
            const response = await fetch('/tasks/events', {
                headers: { 'Authorization': `Bearer ${jwtToken}` },
                signal: abortController.signal
            });

            if (response.status === 401 || response.status === 403) {
                logout(); // Token expired or invalid
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");

            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });

                const lines = buffer.split('\n');
                buffer = lines.pop(); // Keep incomplete lines in buffer

                for (let line of lines) {
                    if (line.startsWith('data:')) {
                        const jsonStr = line.substring(5).trim();
                        if (jsonStr) {
                            try {
                                const task = JSON.parse(jsonStr);
                                renderTask(task);
                            } catch(e) {}
                        }
                    }
                }
            }
        } catch(e) {
            console.log("Stream stopped", e);
        }
    }

    function renderTask(task) {
        if (!task.id || localTasks.includes(task.id)) return;
        localTasks.push(task.id);

        const listId = `list-${task.status}`;
        const container = document.getElementById(listId);
        if(!container) return; // If status doesn't match columns

        const card = document.createElement('div');
        card.className = 'task-card';
        card.innerHTML = `
            <div class="task-title">${task.title || 'Nueva Tarea'}</div>
            <div class="task-desc">${task.description || ''}</div>
            <div class="task-footer">
                <span>#${task.id.slice(-4)}</span>
                <i class="fas fa-align-left"></i>
            </div>
        `;
        
        container.appendChild(card);
        updateCounts();
    }

    function updateCounts() {
        ['TODO', 'IN_PROGRESS', 'DONE'].forEach(status => {
            const list = document.getElementById(`list-${status}`);
            const count = list ? list.children.length : 0;
            const counterEl = document.getElementById(`cnt-${status}`);
            if(counterEl) counterEl.innerText = count;
        });
    }

    // ======== HEXAGONAL: Puerto de salida — Adaptador HTTP usuarios ========
    const usersApiAdapter = {
        async getAll() {
            const res = await fetch('/users', {
                headers: { 'Authorization': `Bearer ${jwtToken}` }
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.message || `Error ${res.status}`);
            }
            return res.json();
        },
        async update(id, data) {
            const res = await fetch(`/users/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${jwtToken}`
                },
                body: JSON.stringify(data)
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.message || `Error al actualizar: ${res.status}`);
            }
            return res.json();
        }
    };

    // ======== HEXAGONAL: Adaptador de entrada UI — Controlador de usuarios ========
    async function loadUsers() {
        const grid = document.getElementById('usersGrid');
        grid.innerHTML = '<div class="users-loading"><i class="fas fa-spinner fa-spin"></i> Cargando usuarios...</div>';
        try {
            const users = await usersApiAdapter.getAll();
            grid.innerHTML = '';
            if (!users.length) {
                grid.innerHTML = '<div class="users-loading">No hay usuarios registrados.</div>';
                return;
            }
            users.forEach(user => grid.appendChild(renderUserCard(user)));
        } catch (err) {
            grid.innerHTML = `<div class="users-loading" style="color: var(--danger);"><i class="fas fa-exclamation-triangle"></i> ${err.message}</div>`;
        }
    }

    function renderUserCard(user) {
        const card = document.createElement('div');
        card.className = 'user-card';
        const initial = (user.username || '?')[0].toUpperCase();
        const isAdmin = user.role === 'ROLE_ADMIN';
        card.innerHTML = `
            <div class="user-card-header">
                <div class="user-avatar">${initial}</div>
                <div>
                    <div class="user-card-name">${user.username}</div>
                    <div class="user-card-email">${user.email || '—'}</div>
                </div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span class="role-badge ${isAdmin ? 'admin' : 'user'}">
                    <i class="fas ${isAdmin ? 'fa-shield-alt' : 'fa-user'}"></i>
                    ${isAdmin ? 'Admin' : 'Usuario'}
                </span>
                <button class="edit-btn" onclick="openEditModal('${user.id}','${user.username}','${user.email || ''}','${user.role}')">
                    <i class="fas fa-pen"></i> Editar
                </button>
            </div>
            <div class="user-id">ID: ${user.id}</div>
        `;
        return card;
    }

    // ======== HEXAGONAL: Adaptador entrada UI — Controlador modal edición ========
    function openEditModal(id, username, email, role) {
        document.getElementById('editUserId').value = id;
        document.getElementById('editUsername').value = '';
        document.getElementById('editEmail').value = '';
        document.getElementById('editPassword').value = '';
        document.getElementById('editRole').value = '';
        document.getElementById('editUserError').innerText = '';
        document.getElementById('editSubmitBtn').innerText = 'Guardar Cambios';
        // Mostrar info actual como placeholder
        document.getElementById('editUsername').placeholder = `Actual: ${username}`;
        document.getElementById('editEmail').placeholder = `Actual: ${email || 'sin email'}`;
        document.getElementById('editUserModal').style.display = 'flex';
        document.getElementById('editUsername').focus();
    }

    function closeEditModal() {
        document.getElementById('editUserModal').style.display = 'none';
        document.getElementById('editUserForm').reset();
    }

    async function submitEditUser(e) {
        e.preventDefault();
        const id       = document.getElementById('editUserId').value;
        const username = document.getElementById('editUsername').value.trim();
        const email    = document.getElementById('editEmail').value.trim();
        const password = document.getElementById('editPassword').value;
        const role     = document.getElementById('editRole').value;

        const payload = {};
        if (username) payload.username = username;
        if (email)    payload.email    = email;
        if (password) payload.password = password;
        if (role)     payload.role     = role;

        if (!Object.keys(payload).length) {
            document.getElementById('editUserError').innerText = 'Debes modificar al menos un campo.';
            return;
        }

        const btn = document.getElementById('editSubmitBtn');
        btn.innerText = 'Guardando...';
        btn.disabled = true;

        try {
            await usersApiAdapter.update(id, payload);
            closeEditModal();
            loadUsers(); // Refresca la grilla
        } catch (err) {
            document.getElementById('editUserError').innerText = err.message;
        } finally {
            btn.innerText = 'Guardar Cambios';
            btn.disabled = false;
        }
    }

    function parseJwt(token) {
        try {
            const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(atob(base64));
        } catch (_) {
            return {};
        }
    }

    function switchView(view) {
        const boardContainer = document.querySelector('.board-container');
        const usersContainer = document.getElementById('usersContainer');
        document.getElementById('navBoard').classList.toggle('active', view === 'board');
        document.getElementById('navUsers').classList.toggle('active', view === 'users');
        if (view === 'board') {
            boardContainer.style.display = 'flex';
            usersContainer.classList.remove('visible');
        } else {
            boardContainer.style.display = 'none';
            usersContainer.classList.add('visible');
            loadUsers();
        }
    }

</script>
</body>
</html>
