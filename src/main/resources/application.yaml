spring:
  docker:
    compose:
      enabled: false
  data:
    mongodb:
      uri: "${MONGODB_URI:mongodb://localhost:27017/velocityboard}"
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8081}
